<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
<head>
    <title>Heart - eu te amo bobinha</title>
    <style>
        html, body { height: 100%; padding: 0; margin: 0; background: #000; overflow: hidden; }
        canvas { position: absolute; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="pinkboard"></canvas>
    <script>
        var settings = {
            particles: {
                length: 3800, 
                duration: 2,
                velocity: 80,
                effect: -0.75,
                size: 9,
            },
        };

        (function () { var b = 0; var c = ["ms", "moz", "webkit", "o"]; for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) { window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"]; window.cancelAnimationFrame = window[c[a] + "CancelAnimationFrame"] || window[c[a] + "CancelRequestAnimationFrame"] } if (!window.requestAnimationFrame) { window.requestAnimationFrame = function (h, e) { var d = new Date().getTime(); var f = Math.max(0, 16 - (d - b)); var g = window.setTimeout(function () { h(d + f) }, f); b = d + f; return g } } if (!window.cancelAnimationFrame) { window.cancelAnimationFrame = function (d) { clearTimeout(d) } } }());

        var Point = (function () {
            function Point(x, y) { this.x = x || 0; this.y = y || 0; }
            Point.prototype.clone = function () { return new Point(this.x, this.y); };
            Point.prototype.length = function (length) {
                if (typeof length == 'undefined') return Math.sqrt(this.x * this.x + this.y * this.y);
                this.normalize(); this.x *= length; this.y *= length; return this;
            };
            Point.prototype.normalize = function () { var length = this.length(); this.x /= length; this.y /= length; return this; };
            return Point;
        })();

        var Particle = (function () {
            function Particle() {
                this.position = new Point();
                this.velocity = new Point();
                this.acceleration = new Point();
                this.age = 0;
            }
            Particle.prototype.initialize = function (x, y, dx, dy) {
                this.position.x = x; this.position.y = y;
                this.velocity.x = dx; this.velocity.y = dy;
                this.acceleration.x = dx * settings.particles.effect;
                this.acceleration.y = dy * settings.particles.effect;
                this.age = 0;
            };
            Particle.prototype.update = function (deltaTime) {
                this.position.x += this.velocity.x * deltaTime;
                this.position.y += this.velocity.y * deltaTime;
                this.velocity.x += this.acceleration.x * deltaTime;
                this.velocity.y += this.acceleration.y * deltaTime;
                this.age += deltaTime;
            };
            Particle.prototype.draw = function (context, image) {
                function ease(t) { return (--t) * t * t + 1; }
                var size = image.width * ease(this.age / settings.particles.duration);
                context.globalAlpha = 1 - this.age / settings.particles.duration;
                context.drawImage(image, this.position.x - size / 2, this.position.y - size / 2, size, size);
            };
            return Particle;
        })();

        var ParticlePool = (function () {
            var particles, firstActive = 0, firstFree = 0, duration = settings.particles.duration;
            function ParticlePool(length) {
                particles = new Array(length);
                for (var i = 0; i < particles.length; i++) particles[i] = new Particle();
            }
            ParticlePool.prototype.add = function (x, y, dx, dy) {
                particles[firstFree].initialize(x, y, dx, dy);
                if (++firstFree == particles.length) firstFree = 0;
                if (firstActive == firstFree) if (++firstActive == particles.length) firstActive = 0;
            };
            ParticlePool.prototype.update = function (deltaTime) {
                if (firstActive < firstFree) {
                    for (var i = firstActive; i < firstFree; i++) particles[i].update(deltaTime);
                } else if (firstFree < firstActive) {
                    for (var i = firstActive; i < particles.length; i++) particles[i].update(deltaTime);
                    for (i = 0; i < firstFree; i++) particles[i].update(deltaTime);
                }
                while (particles[firstActive].age >= duration && firstActive != firstFree) {
                    if (++firstActive == particles.length) firstActive = 0;
                }
            };
            ParticlePool.prototype.draw = function (context, image) {
                if (firstActive < firstFree) {
                    for (var i = firstActive; i < firstFree; i++) particles[i].draw(context, image);
                } else if (firstFree < firstActive) {
                    for (var i = firstActive; i < particles.length; i++) particles[i].draw(context, image);
                    for (i = 0; i < firstFree; i++) particles[i].draw(context, image);
                }
            };
            return ParticlePool;
        })();

        (function (canvas) {
            var context = canvas.getContext('2d'),
                particles = new ParticlePool(settings.particles.length),
                particleRate = settings.particles.length / settings.particles.duration,
                time;
            
            var textPoints = [];

            function pointOnHeart(t) {
                return new Point(
                    160 * Math.pow(Math.sin(t), 3),
                    130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
                );
            }

            function generateTextPoints() {
                var tempCanvas = document.createElement('canvas');
                var tempCtx = tempCanvas.getContext('2d');
                tempCanvas.width = 1000;
                tempCanvas.height = 400;
                
                // Fonte robusta e minúscula
                tempCtx.font = "bold 75px Arial, sans-serif";
                tempCtx.fillStyle = "white";
                tempCtx.textAlign = "center";
                
                // Desenhando em duas linhas para caber o "eu" e ficar legível
                tempCtx.fillText("eu te amo", 500, 100);
                tempCtx.fillText("bobinha", 500, 190);
                
                var data = tempCtx.getImageData(0, 0, 1000, 400).data;
                textPoints = [];
                for (var y = 0; y < 400; y += 2) { 
                    for (var x = 0; x < 1000; x += 2) {
                        if (data[(y * 1000 + x) * 4] > 128) {
                            // Ajuste de posição para centralizar abaixo do coração
                            textPoints.push(new Point(x - 500, -(y - 120 + 260))); 
                        }
                    }
                }
            }

            var image = (function () {
                var canvas = document.createElement('canvas'), context = canvas.getContext('2d');
                canvas.width = settings.particles.size; canvas.height = settings.particles.size;
                context.beginPath();
                context.moveTo(settings.particles.size / 2, settings.particles.size * 0.3);
                context.bezierCurveTo(settings.particles.size * 0.35, 0, 0, settings.particles.size * 0.25, 0, settings.particles.size * 0.5);
                context.bezierCurveTo(0, settings.particles.size * 0.8, settings.particles.size * 0.5, settings.particles.size, settings.particles.size * 0.5, settings.particles.size);
                context.bezierCurveTo(settings.particles.size * 0.5, settings.particles.size, settings.particles.size, settings.particles.size * 0.8, settings.particles.size, settings.particles.size * 0.5);
                context.bezierCurveTo(settings.particles.size, settings.particles.size * 0.25, settings.particles.size * 0.65, 0, settings.particles.size / 2, settings.particles.size * 0.3);
                context.fillStyle = '#ea80b0';
                context.fill();
                var image = new Image();
                image.src = canvas.toDataURL();
                return image;
            })();

            function render() {
                requestAnimationFrame(render);
                var newTime = new Date().getTime() / 1000,
                    deltaTime = newTime - (time || newTime);
                time = newTime;
                context.clearRect(0, 0, canvas.width, canvas.height);

                var amount = particleRate * deltaTime;
                for (var i = 0; i < amount; i++) {
                    var pos;
                    var isText = false;
                    if (Math.random() < 0.7 && textPoints.length > 0) {
                        pos = textPoints[Math.floor(Math.random() * textPoints.length)];
                        isText = true;
                    } else {
                        pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
                    }
                    
                    // Velocidade reduzida no texto para garantir que o "eu" apareça bem
                    var v = isText ? settings.particles.velocity * 0.4 : settings.particles.velocity;
                    var dir = pos.clone().length(v);
                    particles.add(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
                }

                particles.update(deltaTime);
                particles.draw(context, image);
            }

            function onResize() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
                generateTextPoints();
            }
            window.onresize = onResize;
            setTimeout(function () { onResize(); render(); }, 10);
        })(document.getElementById('pinkboard'));
    </script>
</body>
</html>
